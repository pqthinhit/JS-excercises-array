<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập mảng JS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        
        .result-box {
            background-color: #f8f9fa;
            color: #198754;
            font-weight: 500;
        }
    </style>
</head>

<body class="bg-light pb-5">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 900px;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Bài tập xử lý Mảng</h4>
            </div>
            <div class="card-body">
                
                
                <div class="row mb-4">
                    <div class="col-12">
                        <label class="form-label fw-bold">Nhập mảng số nguyên:</label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" id="inputNum" placeholder="Nhập một số nguyên (n)">
                            <button class="btn btn-success" type="button" onclick="getNumber()">Thêm số</button>
                        </div>
                        <div class="alert alert-success py-2 mb-0" role="alert">
                            👉 Mảng hiện tại: <span id="txtArray" class="fw-bold"></span>
                        </div>
                    </div>
                </div>

                <hr>

                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="sumPositive()">1. Tổng số dương</button>
                            <span class="form-control result-box" id="txtSum"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="countPositive()">2. Đếm số dương</button>
                            <span class="form-control result-box" id="txtCount"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="findMin()">3. Số nhỏ nhất</button>
                            <span class="form-control result-box" id="txtMin"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="findMinPos()">4. Số dương nhỏ nhất</button>
                            <span class="form-control result-box" id="txtMinPos"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="findEven()">5. Số chẵn cuối cùng</button>
                            <span class="form-control result-box" id="txtEven"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="sortIncrease()">7. Sắp xếp tăng dần</button>
                            <span class="form-control result-box text-truncate" id="txtIncrease"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="findPrime()">8. Số nguyên tố đầu</button>
                            <span class="form-control result-box" id="txtPrime"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <button class="btn btn-outline-primary w-50 text-start" type="button" onclick="compareNum()">10. So sánh Âm / Dương</button>
                            <span class="form-control result-box" id="txtCompare"></span>
                        </div>
                    </div>
                </div>

                <hr>

               
                <div class="row g-3">
                    <!-- Bài 6: Đổi chỗ -->
                    <div class="col-12">
                        <label class="form-label fw-bold">6. Đổi chỗ giá trị:</label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" id="inputIndex1" placeholder="Vị trí 1 (index)">
                            <input type="number" class="form-control" id="inputIndex2" placeholder="Vị trí 2 (index)">
                            <button class="btn btn-warning" type="button" onclick="changePosition()">Đổi chỗ</button>
                        </div>
                        <div class="alert alert-warning py-2 mb-0">
                            👉 Mảng sau khi đổi: <span id="txtChangePos" class="fw-bold"></span>
                        </div>
                    </div>

                    <!-- Bài 9: Mảng số thực -->
                    <div class="col-12 mt-4">
                        <label class="form-label fw-bold">9. Nhập mảng số thực & Đếm số nguyên:</label>
                        <div class="input-group mb-2">
                            <input type="number" class="form-control" id="inputFloat" placeholder="Nhập một số thực">
                            <button class="btn btn-info text-white" type="button" onclick="getFloat()">Thêm số</button>
                            <button class="btn btn-primary" type="button" onclick="findInt()">Đếm số nguyên</button>
                        </div>
                        <div class="alert alert-info py-2 mb-2">
                            👉 Mảng số thực: <span id="txtArrayFloat" class="fw-bold"></span>
                        </div>
                        <div class="alert alert-success py-2 mb-0">
                            👉 Số lượng số nguyên trong mảng: <span id="txtInt" class="fw-bold"></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="./main.js"></script>
</body>

</html>
